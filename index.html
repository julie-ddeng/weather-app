<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="project--title" class="container">
            <h1>Current Forecasts in Canada</h1>
        </div>
        <div id="weather-info" class="container">
            <h2 id="location"></h2>
            <h3 id="main-temperature" class="main-info"></h3>
            <h3 id="weather-main" class="main-info"></h3>
            
            <div id="weather-details">
                <div id="feels-like"></div>
                <div id="humidity"></div>
                <div id="wind"></div>
                <div id="wind-gust"></div>
            </div>
        </div>

        <div id="get-weather-container" class="container"> 
            <label for="city-input">Enter a city in Canada:</label>
            <input type="text" id="city-name" name="city">
            <button id="get-weather-btn">Get weather!</button>
        </div>

    <script src="script.js"></script>
    </body>
</html>
